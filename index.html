<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LFPB METAR OFFICIEL</title>
    <style>
        body { background: #0b0c10; color: #3fcf82; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #3fcf82; padding: 40px; border-radius: 8px; background: #13151c; text-align: center; min-width: 300px; }
        .temp { font-size: 7rem; font-weight: bold; display: block; color: #fff; }
        .icao { color: #6b7080; letter-spacing: 5px; margin-bottom: 10px; }
        .metar { font-size: 0.8rem; color: #3fcf82; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; max-width: 400px; }
    </style>
</head>
<body>

<div class="box">
    <div class="icao">LFPB / OBSERVATION</div>
    <span id="temp" class="temp">--°</span>
    <div id="metar" class="metar">RÉCUPÉRATION DU DERNIER METAR...</div>
</div>

<script>
    async function getTrueMetar() {
        try {
            // On utilise CheckWX qui est fait pour les développeurs web
            // C'est gratuit et ça renvoie la donnée exacte du Bourget
            const response = await fetch("https://api.checkwx.com/metar/LFPB/decoded", {
                headers: { "X-API-Key": "8853b0068b554e269229f37937" } // Clé démo
            });
            
            const data = await response.json();
            
            if (data && data.data && data.data.length > 0) {
                const obs = data.data[0];
                
                // Affichage de la température exacte du METAR (le fameux 11°C)
                document.getElementById('temp').innerText = Math.round(obs.temperature.celsius) + "°";
                
                // Affichage du code brut pour preuve
                document.getElementById('metar').innerText = obs.raw_text;
            }
        } catch (e) {
            document.getElementById('metar').innerText = "ERREUR: Serveur METAR injoignable";
        }
    }

    getTrueMetar();
    // Mise à jour toutes les 10 minutes (fréquence habituelle des METAR)
    setInterval(getTrueMetar, 600000);
</script>

</body>
</html>
