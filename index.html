<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>METAR LFPB Direct</title>
    <style>
        body { background: #0b0c10; color: #4cc9f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #4cc9f0; padding: 30px; border-radius: 10px; background: #13151c; text-align: center; }
        .temp { font-size: 5rem; display: block; }
        .raw { font-size: 0.8rem; color: #6b7080; margin-top: 20px; max-width: 400px; }
    </style>
</head>
<body>

<div class="box">
    <div style="color: #6b7080; margin-bottom: 10px;">LFPB - METAR OFFICIEL</div>
    <span id="temp" class="temp">--°C</span>
    <div id="raw" class="raw">Chargement du flux...</div>
</div>

<script>
    async function getMetar() {
        // Le lien exact que tu veux, mais encapsulé dans un proxy pour éviter la 403
        const targetUrl = "https://aviationweather.gov/api/data/metar?ids=LFPB&format=json&hoursBeforeNow=2";
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Erreur de réseau');
            
            const data = await response.json();
            // AllOrigins renvoie les données dans "contents" sous forme de texte, on le re-transforme en JSON
            const metarList = JSON.parse(data.contents);

            if (metarList && metarList.length > 0) {
                // On prend le dernier relevé (index 0 ou le dernier selon l'API)
                const latest = metarList[0]; 
                
                // Affichage de la température exacte du METAR
                document.getElementById('temp').innerText = latest.temp + "°C";
                
                // Affichage du code METAR brut pour vérification
                document.getElementById('raw').innerText = latest.rawOb;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('raw').innerText = "Erreur de récupération (CORS/Proxy)";
        }
    }

    getMetar();
    // Refresh toutes les 10 min
    setInterval(getMetar, 600000);
</script>

</body>
</html>
