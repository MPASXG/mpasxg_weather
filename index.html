<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Météo LFPB - Le Bourget</title>
    <style>
        body { background: #0b0c10; color: #4f8ef7; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .temp-card { text-align: center; border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 24px; background: #13151c; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1rem; color: #6b7080; letter-spacing: 2px; margin-bottom: 20px; }
        .value { font-size: 6rem; font-weight: 800; line-height: 1; }
        .unit { font-size: 2rem; color: #6b7080; vertical-align: top; }
        .details { margin-top: 20px; color: #3fcf82; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="temp-card">
    <h1>LFPB · PARIS LE BOURGET</h1>
    <div id="temp" class="value">--</div>
    <div id="details" class="details">Connexion en cours...</div>
</div>

<script>
    async function updateWeather() {
        // Coordonnées exactes du Bourget (LFPB)
        const lat = 48.969;
        const lon = 2.441;
        
        try {
            // Cette API ne bloque JAMAIS (pas besoin de proxy)
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m&timezone=auto`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            if (data && data.current) {
                const temperature = Math.round(data.current.temperature_2m);
                const wind = data.current.wind_speed_10m;
                
                document.getElementById('temp').innerHTML = `${temperature}<span class="unit">°C</span>`;
                document.getElementById('details').innerHTML = `VENT: ${wind} km/h • MISE À JOUR OK`;
            }
        } catch (error) {
            document.getElementById('details').innerHTML = "ERREUR DE RÉCEPTION";
            document.getElementById('details').style.color = "#f76565";
        }
    }

    updateWeather();
    // Rafraîchir toutes les 10 minutes
    setInterval(updateWeather, 600000);
</script>

</body>
</html>
