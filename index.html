<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LFPB METAR - Direct</title>
    <style>
        body { background: #0b111a; color: #00d4ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00d4ff; padding: 40px; border-radius: 4px; background: #0f172a; text-align: center; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .temp { font-size: 7rem; font-weight: bold; display: block; }
        .label { color: #64748b; font-size: 1rem; margin-bottom: 10px; }
        .info { color: #34d399; font-size: 0.9rem; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div class="label">STATION LFPB (OBSERVATION)</div>
    <span id="temp" class="temp">--°</span>
    <div id="info" class="info">RÉCUPÉRATION...</div>
</div>

<script>
    async function getWeather() {
        // Coordonnées précises du Bourget
        const lat = 48.969;
        const lon = 2.441;
        
        try {
            // On demande la température actuelle RÉELLE (current) et non la prévision
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&timezone=auto`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            if (data && data.current) {
                const temperature = Math.round(data.current.temperature_2m);
                const wind = data.current.wind_speed_10m;
                
                document.getElementById('temp').innerText = temperature + "°";
                document.getElementById('info').innerHTML = `VENT: ${wind} KM/H | MAJ: OK`;
            }
        } catch (e) {
            document.getElementById('info').innerText = "ERREUR DE CONNEXION";
        }
    }

    getWeather();
    setInterval(getWeather, 600000); // MAJ toutes les 10 min
</script>

</body>
</html>
