<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LFPB - Météo Temps Réel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #16213e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        h1 { color: #4cc9f0; border-bottom: 2px solid #4cc9f0; padding-bottom: 10px; margin-top: 0; }
        h2 { color: #4cc9f0; font-size: 1.2em; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #0f3460; }
        th, td { padding: 12px; border: 1px solid #1a1a2e; text-align: left; }
        th { background: #4cc9f0; color: #1a1a2e; text-transform: uppercase; font-size: 0.85em; }
        tr:nth-child(even) { background: #162447; }
        .metar-raw { font-family: 'Courier New', Courier, monospace; font-size: 0.9em; color: #a2d2ff; word-break: break-all; }
        .loading { color: #f72585; font-style: italic; }
        .badge { background: #4cc9f0; color: #1a1a2e; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1><span class="badge">LFPB</span> Paris - Le Bourget</h1>
    
    <h2>Dernières observations (6h)</h2>
    <table id="historyTable">
        <thead>
            <tr>
                <th style="width: 15%;">Heure (Z)</th>
                <th style="width: 10%;">Temp.</th>
                <th style="width: 15%;">Vent</th>
                <th>Code METAR</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4" class="loading">Récupération des données en cours...</td></tr>
        </tbody>
    </table>

    <h2>Prévisions (TAF)</h2>
    <table id="forecastTable">
        <thead>
            <tr>
                <th style="width: 15%;">Validité (Z)</th>
                <th>Conditions prévues</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="2" class="loading">Attente des prévisions...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const ICAO = "LFPB";

    async function updateWeather() {
        try {
            // 1. Récupération des METAR (Historique)
            const metarUrl = `https://aviationweather.gov/api/data/metar?ids=${ICAO}&format=json&hoursBeforeNow=6`;
            const resMetar = await fetch(metarUrl);
            if (!resMetar.ok) throw new Error("API Indisponible");
            const metarData = await resMetar.json();
            
            const historyBody = document.querySelector("#historyTable tbody");
            if (metarData.length > 0) {
                historyBody.innerHTML = metarData.map(obs => `
                    <tr>
                        <td><strong>${obs.reportTime.split('T')[1].substring(0, 5)}Z</strong></td>
                        <td>${obs.temp}°C</td>
                        <td>${obs.wdir}° / ${obs.wspd}kt</td>
                        <td class="metar-raw">${obs.rawOb}</td>
                    </tr>
                `).join('');
            } else {
                historyBody.innerHTML = "<tr><td colspan='4'>Aucune donnée récente trouvée.</td></tr>";
            }

            // 2. Récupération des TAF (Prévisions)
            const tafUrl = `https://aviationweather.gov/api/data/taf?ids=${ICAO}&format=json`;
            const resTaf = await fetch(tafUrl);
            const tafData = await resTaf.json();
            
            const forecastBody = document.querySelector("#forecastTable tbody");
            if (tafData.length > 0 && tafData[0].forecast) {
                // On prend les 5 prochaines lignes de prévisions
                forecastBody.innerHTML = tafData[0].forecast.slice(0, 5).map(f => `
                    <tr>
                        <td><strong>${f.fcstFrom.split('T')[1].substring(0, 5)}Z</strong></td>
                        <td class="metar-raw">${f.rawFcst || "Changement de conditions"}</td>
                    </tr>
                `).join('');
            } else {
                forecastBody.innerHTML = "<tr><td colspan='2'>Pas de TAF disponible pour le moment.</td></tr>";
            }

        } catch (error) {
            console.error("Erreur:", error);
            document.querySelectorAll("tbody").forEach(tb => {
                tb.innerHTML = `<tr><td colspan="4" style="color: #f72585;">Erreur de connexion aux données météo.</td></tr>`;
            });
        }
    }

    // Lancer la fonction au chargement
    updateWeather();
    // Actualiser automatiquement toutes les 10 minutes
    setInterval(updateWeather, 600000);
</script>

</body>
</html>
