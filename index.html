<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Température LFPB</title>
    <style>
        body { background: #0b0c10; color: #4f8ef7; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .temp-display { text-align: center; border: 2px solid #1f2833; padding: 40px; border-radius: 20px; background: #13151c; }
        h1 { font-size: 1.2rem; color: #6b7080; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 5rem; font-weight: bold; }
        .unit { font-size: 2rem; color: #6b7080; }
    </style>
</head>
<body>

<div class="temp-display">
    <h1>Paris Le Bourget (LFPB)</h1>
    <div id="temp" class="value">--</div>
    <div id="time" style="color: #6b7080; margin-top: 10px;">Chargement...</div>
</div>

<script>
    async function getTemperature() {
        const icao = "LFPB";
        const url = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hoursBeforeNow=2`;
        
        try {
            // Utilisation d'un proxy pour éviter l'erreur 403/CORS sur Netlify
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            // Le contenu est envoyé sous forme de chaîne de caractères dans "contents"
            const metarArray = JSON.parse(data.contents);
            
            if (metarArray && metarArray.length > 0) {
                // On récupère le dernier relevé (le plus récent)
                const latest = metarArray[metarArray.length - 1];
                
                document.getElementById('temp').innerHTML = `${latest.temp}<span class="unit">°C</span>`;
                document.getElementById('time').innerText = `Relevé de ${latest.reportTime.split('T')[1].substring(0, 5)}Z`;
            } else {
                document.getElementById('temp').innerText = "??";
                document.getElementById('time').innerText = "Aucune donnée disponible";
            }
        } catch (error) {
            console.error("Erreur:", error);
            document.getElementById('temp').innerText = "Err";
            document.getElementById('time').innerText = "Erreur de connexion";
        }
    }

    getTemperature();
    // Actualise toutes les 5 minutes
    setInterval(getTemperature, 300000);
</script>

</body>
</html>
